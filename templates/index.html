<!DOCTYPE html>
<html>
<head>
    <title>YOLO Image & Video Detection</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url("https://www.smec.ac.in/assets/accessibility/signs/s7.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            font-family: 'Poppins', sans-serif;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.4);
            z-index: -1;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 15px;
            color: black;
            width: 80%;
            max-width: 800px;
        }

        h1 {
            margin-bottom: 25px;
            font-size: 36px;
            font-weight: bold;
            color: #ad2b80;
            background: #ffd54f;
            padding: 10px 20px;
            border-radius: 10px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        input[type="file"] {
            padding: 8px;
            border-radius: 6px;
            border: none;
            background: white;
            cursor: pointer;
            color: black;
        }

        button {
            padding: 10px 30px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            transition: 0.3s ease;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.1);
        }

        .count-box {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        .count-box h3 {
            font-size: 22px;
            color: red;
        }

        .result img {
            max-width: 600px;
            width: 100%;
            height: auto;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>YOLO Image & Video Detection</h1>

    <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Detect</button>
    </form>

    <!-- 🔥 Total + Classification -->
    {% if total is not none %}
    <div class="count-box">
        <h3>Total Detected Objects: {{ total }}</h3>

        {% if counts %}
            {% for cls, count in counts.items() %}
                <p>{{ cls }} : {{ count }}</p>
            {% endfor %}
        {% endif %}
    </div>
    {% endif %}

    <!-- Image Result -->
    {% if image_result %}
    <div class="result">
        <img src="{{ url_for('static', filename='result.jpg') }}">
    </div>
    {% endif %}

    <!-- Video Result -->
    {% if video_result %}
    <div class="result">
        <img src="{{ url_for('video_feed') }}">
    </div>
    {% endif %}

</div>

</body>
</html>
